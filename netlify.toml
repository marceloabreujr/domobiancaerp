[build]
  # Build only the Vite frontend; functions are bundled separately by Netlify
  command = "pnpm build:client"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS  = "--max-old-space-size=4096"

[functions]
  # Use esbuild to bundle TypeScript functions (respects tsconfig.json paths)
  node_bundler = "esbuild"
  # Include drizzle migration files if needed at runtime
  included_files = ["drizzle/**"]

# ─── API → Netlify Function ────────────────────────────────────────────────
# Route all /api/* calls to the serverless Express handler.
# The function mounts tRPC at both /api/trpc and /trpc so it works
# regardless of how Netlify passes the path.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

# ─── SPA fallback ──────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
